<!--LOCAL HTML FILE ON GAIA-PRIME IS OUT-OF-DATE BY DEFAULT; UP-TO-DATE VERSION IS ON CLOUDFLARE-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Clover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: hsl(200, 40%, 15%); --surface: hsl(190, 32%, 22%); --surface2: hsl(185, 28%, 18%);
    --accent: hsl(170, 45%, 40%); --accent2: hsl(165, 50%, 20%); --accent3: hsl(165, 65%, 35%);
    --text: hsl(158, 25%, 92%); --muted: hsl(157, 29%, 70%);
    --border: hsla(158, 43%, 44%, 0.18);
    --red1: hsl(340, 68%, 62%); --red1-35: hsla(0, 68%, 62%, 0.35); --red1-0: hsla(0, 68%, 62%, 0.08); 
    --tk: hsl(139, 49%, 72%);  /* Tasks*/
    --bk: hsl(336, 56%, 76%);  /* Blockers*/
    --fm: hsl(255, 60%, 76%);  /* Force-Multipliers */
    --gh: hsl(213, 67%, 75%);  /* Good Habits*/
    --pl: hsl(75, 67%, 75%);  /* Planning*/
    --ft: hsl(12, 82%, 75%);  /* Family Tasks*/
    --in: hsl(158, 9%, 62%);  /* Inbox (shouldn't appear in execution waterfall) */
    --font: 'Montserrat', sans-serif;
    font-size: 100%;  /* the "base" — change this one number to rescale everything */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overscroll-behavior: none; }
  body { display: flex; flex-direction: column; min-height: 90vh; }
  #header {
    padding: 13px 16px 10px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  #header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.12em; color: var(--accent2); text-transform: uppercase; }
  #header-right { display: flex; align-items: center; gap: 10px; }
  #mode-badge { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  #status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
  #status-dot.ready { background: var(--tk); }
  #status-dot.partial { background: var(--fm); }
  #status-dot.error { background: var(--red1); }
  #chat { flex: 1; overflow-y: auto; padding: 0px; display: flex; flex-direction: column; }
  #chat-inner { width: 100%; max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 11px; }
  .msg { max-width: 92%; line-height: 1.55; margin: 16px; font-size: 0.93rem; font-weight: 400; animation: fadeUp 0.2s ease; }
  .msg.assistant {
    align-self: flex-start; background: var(--surface); border: 1px solid var(--border); 
    max-width: 700px;
    border-radius: 4px 14px 14px 14px; padding: 11px 14px; color: var(--text); position: relative;
  }
  .msg.user {
    align-self: flex-end; background: var(--accent);
    max-width: 700px;
    border-radius: 14px 4px 14px 14px; padding: 9px 13px; color: white;
  }
  .msg.sys { align-self: center; font-size: 0.65rem; color: var(--muted); padding: 2px 0; letter-spacing: 0.05em; }
  .speak-btn {
    position: absolute; top: 7px; right: 9px; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.69rem; padding: 2px 4px; opacity: 0.4; transition: opacity 0.15s;
    margin: 5px;
  }
  .speak-btn:hover { opacity: 1; }
  .log-note { display: block; font-size: 0.65rem; color: var(--muted); margin-top: 5px; font-weight: 400; opacity: 0.6; }
  .log-note.fail { color: var(--fm); opacity: 1; }
  .copy-btn {
    display: inline-block; margin-top: 4px; font-size: 0.65rem; color: var(--accent2);
    background: none; border: 1px solid var(--border); border-radius: 10px;
    padding: 3px 10px; cursor: pointer; font-family: var(--font); font-weight: 500;
  }
  .task-panel { margin-top: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .task-panel-header { padding: 8px 11px; display: flex; align-items: flex-start; justify-content: space-between; cursor: pointer; user-select: none; }
  .task-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
  .task-label.TK { color: var(--tk); }
  .task-label.BK { color: var(--bk); }
  .task-label.FM { color: var(--fm); }
  .task-label.GH { color: var(--gh); }
  .task-label.PL { color: var(--pl); }
  .task-label.FT { color: var(--ft); }
  .task-label.IN { color: var(--in); }  
  .task-panel-title { font-size: 0.75rem; font-weight: 500; color: var(--text); margin-top: 2px; line-height: 1.4; }
  .task-due { font-size: 0.65rem; color: var(--red1); margin-top: 2px; font-weight: 500; }
  .task-chevron { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; margin-top: 2px; }
  .task-chevron.open { transform: rotate(180deg); }
  .task-panel-body { display: none; padding: 0 11px 10px; border-top: 1px solid var(--border); }
  .task-panel-body.open { display: block; }
  .task-notes { font-size: 0.75rem; color: var(--muted); line-height: 1.6; white-space: pre-wrap; margin-top: 8px; font-weight: 400; }
  .task-notes a { color: var(--accent2); text-decoration: none; }
  .task-notes a:hover { text-decoration: underline; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .qbtn {
    background: transparent; border: 1px solid var(--border); color: var(--accent2);
    border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; cursor: pointer;
    font-family: var(--font); font-weight: 500; transition: background 0.12s;
  }
  .qbtn:hover { background: var(--surface2); }





  #input-area {
    padding: 10px 14px 18px; background: var(--surface);
    border-top: 1px solid var(--border); display: flex; gap: 9px; align-items: flex-end;
  }
  #user-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 13px; color: var(--text); font-family: var(--font); font-size: 0.81rem;
    font-weight: 500; resize: none; min-height: 40px; max-height: 110px; line-height: 1.5; outline: none;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }
  #send-btn {
    background: var(--accent); border: none; border-radius: 10px; width: 40px; height: 40px;
    cursor: pointer; color: white; font-size: 1.06rem; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  #send-btn:disabled { opacity: 0.35; cursor: default; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

#triage-btn {
    background: none; border: 1px solid var(--border); color: var(--accent2);
    border-radius: 8px; padding: 4px 10px; font-size: 0.65rem; font-family: var(--font);
    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    display: none;
  }
  #triage-btn.visible { display: block; }
  #triage-panel {
    display: none; flex: 1; overflow-y: auto; padding: 16px;
    flex-direction: column; gap: 12px;
    max-width: 700px; align-self: center; width: 100%;
  }
  #triage-panel.visible { display: flex; }
  .triage-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .triage-section h2 { font-size: 0.69rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .file-list { display: flex; flex-direction: column; gap: 6px; }
  .file-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 0.81rem; font-family: var(--font);
    font-weight: 500; cursor: pointer; text-align: left; transition: border-color 0.15s;
  }
  .file-btn:hover { border-color: var(--accent); }
  .file-btn.selected { border-color: var(--accent); background: var(--border); }
  .triage-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .triage-action-btn {
    background: var(--accent); border: none; border-radius: 8px; padding: 8px 16px;
    color: white; font-size: 0.75rem; font-family: var(--font); font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  .triage-action-btn:disabled { opacity: 0.35; cursor: default; }
  .triage-action-btn.secondary {
    background: none; border: 1px solid var(--border); color: var(--accent2);
  }
  .triage-status { font-size: 0.75rem; color: var(--muted); font-weight: 500; }

  /* ── Voice mode ── */
  #voice-toggle {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 4px 10px; font-size: 0.65rem; font-family: var(--font);
    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  #voice-toggle.active { color: var(--accent2); border-color: var(--accent2); }

  #voice-bar {
    display: none; flex-direction: column; align-items: center; justify-content: flex-end;
    padding: 18px 20px 24px; gap: 14px; background: var(--surface);
    border-top: 1px solid var(--border);
  }
  #voice-bar.visible { display: flex; }

  #mic-btn {
    width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--accent3); color: white; font-size: 1.75rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 hsla(158, 90%, 69%, 0.007);
    position: relative;
/*adding manually to disable context menu*/
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #mic-btn img {
    pointer-events: none; /* Ensures clicks pass directly through to the button */
  }


  #mic-btn.listening {
    background: var(--red1);
    box-shadow: 0 0 0 10px var(--border);
    animation: pulse-ring 1.4s ease-out infinite;
  }
  #mic-btn.speaking { background: var(--tk); }
  #mic-btn:disabled { opacity: 0.4; cursor: default; }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 var(--red1-35); }
    70%  { box-shadow: 0 0 0 14px var(--red1-0); }
    100% { box-shadow: 0 0 0 0 var(--red1-0); }
  }

  #voice-mode-row {
    display: flex; gap: 8px; align-items: center;
  }
  .vmode-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 20px; padding: 4px 12px; font-size: 0.69rem; font-family: var(--font);
    font-weight: 600; letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s;
  }
  .vmode-btn.selected { border-color: var(--accent2); color: var(--accent2); background: var(--border); }

  #voice-status {
    font-size: 0.69rem; color: var(--muted); letter-spacing: 0.06em; min-height: 16px;
    text-align: center; font-weight: 500;
  }

  /* ── Winnow UI ─────────────────────────────────────────────────────────── */
  .winnow-block {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; outline: none;
    max-width: 700px; align-self: center; width: 100%;
    font-size: 0.81rem; line-height: 1.55;
    display: grid;
    grid-template-columns: 150px 300px 1fr;
    column-gap: 16px; row-gap: 12px;
    align-items: start;
  }
  .winnow-block:focus-within { border-color: var(--accent); }
  /* Full-width rows */
  .winnow-block > .winnow-item-counter,
  .winnow-block > .winnow-timer,
  .winnow-block > .winnow-resolution,
  .winnow-block > .winnow-actions { grid-column: 1 / -1; }
  .winnow-item-counter {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent2);
  }
  .winnow-item-text {
    font-size: 0.81rem; color: var(--text); white-space: pre-wrap;
    word-wrap: break-word; overflow-wrap: anywhere; font-weight: 500;
  }
  .winnow-section-label {
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em;
    text-transform: none; color: var(--muted); margin-bottom: 6px;
  }
  .winnow-section-label.dim { color: hsla(158, 9%, 62%, 0.5); }
  /* slider — column 1, 150 × 23 */
  .winnow-slider {
    position: relative; width: 150px; height: 23px;
    background: #ffffff0f; border-radius: 12px;
    cursor: pointer; overflow: hidden; user-select: none; touch-action: none;
  }
  .winnow-slider:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .winnow-slider-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: #ffffffeb; border-radius: 12px; width: 0%;
    transition: width 0.06s linear;
  }
  .winnow-slider.untouched .winnow-slider-fill { background: var(--accent1); }
  /* effort radios — column 3, wrap as needed, tight padding/gap */
  .winnow-effort { display: flex; gap: 4px; flex-wrap: wrap; }
  .effort-btn {
    background: #ffffff14; border: none; color: var(--text);
    border-radius: 14px; padding: 3px 9px; font-size: 0.75rem; font-weight: 500;
    font-family: var(--font); cursor: pointer; transition: background 0.12s, color 0.12s;
  }
  .effort-btn:hover { background: #ffffff24; }
  .effort-btn.selected { background: var(--text); color: var(--bg); font-weight: 600; }
  .effort-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* timer — invisible until last 10s, then bigger + flashing border */
  .winnow-timer {
    text-align: center; margin-top: 4px; min-height: 18px; visibility: hidden;
  }
  .winnow-timer.show { visibility: visible; }
  .winnow-timer.dim {
    visibility: visible; font-size: 0.69rem; color: var(--muted); font-weight: 500;
  }
  .winnow-timer-pill {
    display: inline-block; font-size: 1.75rem; font-weight: 700; color: var(--fm);
    padding: 6px 22px; border: 3px solid var(--fm); border-radius: 16px;
    line-height: 1; letter-spacing: 0.04em;
    animation: timer-flash 1s linear infinite;
  }
  @keyframes timer-flash {
    0%   { border-color: var(--fm); }
    49%  { border-color: var(--fm); }
    50%  { border-color: transparent; }
    99%  { border-color: transparent; }
    100% { border-color: var(--fm); }
  }
  /* resolution + actions */
  .winnow-resolution {
    margin-top: 4px; padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 0.75rem; color: var(--text);
  }
  .winnow-resolution .outcome { font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .winnow-resolution .outcome.keep { color: var(--tk); }
  .winnow-resolution .outcome.abandon { color: var(--red1); }
  .winnow-resolution .outcome.salvage-band { color: var(--fm); }
  .winnow-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .winnow-action-btn {
    background: transparent; border: 1px solid var(--border); color: var(--accent2);
    border-radius: 18px; padding: 7px 14px; font-size: 0.75rem; font-weight: 500;
    font-family: var(--font); cursor: pointer; transition: background 0.12s;
  }
  .winnow-action-btn:hover { background: var(--border); }
  .winnow-action-btn:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .winnow-action-btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .winnow-action-btn.primary:hover { background: var(--accent2); }
  .winnow-action-btn.danger { border-color: var(--red1-35); color: var(--red1); }
  .winnow-action-btn.danger:hover { background: var(--red1-0); }

  /* hide text input area when voice mode active */
  #input-area.hidden { display: none; }

</style>
</head>
<body>
<div id="header">
  <h1>Clover</h1>
  <div id="header-right">
    <span id="mode-badge">loading…</span>
    <button id="voice-toggle">Voice</button>
    <button id="triage-btn">Triage</button>
    <div id="status-dot"></div>
  </div>
</div>
<div id="chat"><div id="chat-inner"></div></div>

<div id="triage-panel">
  <div class="triage-section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
      <h2 style="margin:0">Select a note to triage</h2>
      <button class="triage-action-btn secondary" id="back-btn" style="font-size:11px; padding:4px 10px">← Back to chat</button>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>
  <div class="triage-section" id="triage-controls" style="display:none">
    <h2>Actions</h2>
    <div class="triage-status" id="triage-status">Note selected.</div>
    <div class="triage-actions" style="margin-top:10px">
      <button class="triage-action-btn" id="winnow-btn" disabled>Winnow</button>
      <button class="triage-action-btn" id="annotate-btn" disabled>Annotate in Obsidian</button>
      <button class="triage-action-btn secondary" id="execute-btn" disabled>Done reviewing — execute</button>
    </div>
  </div>
</div>

<div id="voice-bar">
  <div id="voice-mode-row">
    <button class="vmode-btn selected" id="vmode-walkie">Walkie-talkie</button>
    <button class="vmode-btn" id="vmode-convo">Conversation</button>
  </div>
  <button id="mic-btn"><img src="https://annasedlacek.com/wp-content/uploads/2026/06/1000021527-removebg-preview.png" width="30px" height="30px"></button>
  <div id="voice-status">hold to talk</div>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="what's up" rows="1"></textarea>
  <button id="send-btn">↑</button>
</div>
<script>
  
// Key is stored in this browser's localStorage, not in the file. Entered once per device.
let OBSIDIAN_KEY = localStorage.getItem('obsidian_key');
if (!OBSIDIAN_KEY) {
  OBSIDIAN_KEY = prompt('Enter your Obsidian Local REST API key (stored only in this browser, on this device):');
  if (OBSIDIAN_KEY) localStorage.setItem('obsidian_key', OBSIDIAN_KEY);
}
  
const GISTS = {
  parts:    '37447f4e736f888a718a9e2f0d96c9d6',
  feedback: 'de9628558a0af0334318eb3a4bd53f93',
  context:  'd5a46abda4e74f893c3801c2445197e8',
  triage:   '62483c2459a069064ae9defb6d1da5b4'
};

// Direct connection to Obsidian Local REST API plugin on this machine.
// HTTP (not HTTPS) used intentionally — localhost-to-localhost, no encryption needed,
// and it avoids the self-signed-cert step required by the HTTPS port.
const OBSIDIAN = {
  base: 'http://127.0.0.1:27123',
  key:  OBSIDIAN_KEY
};

// Helper for every Obsidian call. Returns the Response object so callers can check r.ok
// and read text/json as needed. Encodes the path so spaces and unicode in note titles work.
async function obsidian(path, { method = 'GET', body = null, contentType = 'text/markdown' } = {}) {
  const url = `${OBSIDIAN.base}/vault/${path.split('/').map(encodeURIComponent).join('/')}`;
  const opts = {
    method,
    headers: { 'Authorization': `Bearer ${OBSIDIAN.key}` }
  };
  if (body !== null) {
    opts.headers['Content-Type'] = contentType;
    opts.body = body;
  }
  return fetch(url, opts);
}

let TASKS = [];

const NOW = new Date();
let partsContent = '';
let extraContext = '';
let history = [];
let mode = 'triage';
let cachedSystem = '';

const chat = document.getElementById('chat');
const chatInner = document.getElementById('chat-inner');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const modeBadge = document.getElementById('mode-badge');
const statusDot = document.getElementById('status-dot');

function setMode(m) { mode = m; modeBadge.textContent = m + ' mode'; }

function daysUntil(due) { return due ? Math.round((new Date(due) - NOW) / 86400000) : null; }
function formatDue(due) {
  const d = daysUntil(due);
  if (d === null) return null;
  if (d < 0) return `overdue ${Math.abs(d)}d`;
  if (d === 0) return 'due today';
  if (d === 1) return 'due tomorrow';
  return `due in ${d}d`;
}

async function fetchGist(id) {
  const r = await fetch(`https://clover-backend.kairikeymaster.workers.dev/gist?id=${id}`);
  if (!r.ok) throw new Error('gist fetch failed');
  const text = await r.text();
  return { content: text, filename: 'file.md' };
}

async function fetchTasks() {
  try {
    const r = await fetch('https://clover-backend.kairikeymaster.workers.dev/ticktick/alltasks');
    if (!r.ok) throw new Error('tasks fetch failed');
    TASKS = await r.json();
  } catch(e) {
    console.error('Failed to fetch tasks:', e);
    addMsg('assistant', `error at fetchTasks function: ${e}`);
  }
}

async function checkObsidian() {
  try {
    const r = await obsidian('.obsidian/app.json');
    return r.ok;
  } catch(e) {
    if (!shouldAutoVoice()) {
      addMsg('assistant', `error at checkObsidian function: ${e}`);
    return false;
    }
  }
}

async function appendFeedback(entry) {
  try {
    const r = await fetch('https://clover-backend.kairikeymaster.workers.dev/append-feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback: entry })
    });
    const d = await r.json();
    console.log(d);
    return d.ok;
  } catch(e) { 
    addMsg('assistant', `error at appendFeedback function: ${e}`);

// Parses a callout line into a structured object so we can compare meaning, not text.
// Strips breadcrumb HTML comments (<!-- ... -->) before parsing, so the validator's
// auto-correction annotations don't cause false "corrected" diffs.
function parseCallout(line) {
  if (!line) return { type: 'none' };
  const stripped = line.replace(/<!--[\s\S]*?-->/g, '').trim();
  if (!stripped.startsWith('> [!info]')) return { type: 'none' };

  if (stripped.includes('TickTick')) {
    // New schema: project (~TK/BK/FM/GH/FT), priority (!pN), zero-or-more tags (#HE/#LCL/#HCL/#d0/#d1).
    const project  = (stripped.match(/\\?~(TK|BK|FM|GH|FT)\b/) || [])[1] || null;
    const priority = (stripped.match(/\\?!(p0|p1|p3|p5)\b/) || [])[1] || null;
    const tags     = [...stripped.matchAll(/\\?#(HE|LCL|HCL|d0|d1)\b/g)].map(m => m[1]);
    return { type: 'ticktick', project, priority, tags };
    }
  if (stripped.includes('Obsidian')) {
    const m = stripped.match(/Obsidian > (.+?) > \\?([*+])(.*?)$/);
    if (m) {
      return { type: 'obsidian', folder: m[1].trim(), marker: m[2], title: m[3].trim() };
    }
    // Folder-only, no marker.
    const f = stripped.match(/Obsidian > (.+?)\s*$/);
    if (f) return { type: 'obsidian', folder: f[1].trim(), marker: null, title: null };
  }
  return { type: 'unknown', raw: stripped };
}

// Deep-compare two parsed callouts. Returns true if they encode the same destination.
function calloutsMatch(a, b) {
  if (a.type !== b.type) return false;
  if (a.type === 'ticktick') {
    if (a.project !== b.project || a.priority !== b.priority) return false;
    // Compare tags as a set, not as an ordered list — tag order is not meaningful.
    const setA = new Set(a.tags || []);
    const setB = new Set(b.tags || []);
    if (setA.size !== setB.size) return false;
    for (const t of setA) if (!setB.has(t)) return false;
    return true;
  }
  if (a.type === 'obsidian') return a.folder === b.folder && a.marker === b.marker && a.title === b.title;
  return a.type === b.type;
}

// ── Tool definitions for Claude ─────────────────────────────────────────────
const TOOLS = [
  {
    name: 'fetch_bucket',
    description: 'Fetch the actual tasks inside a specific waterfall priority bucket. Use this whenever you need to see what tasks are pending in a bucket, recommend a task to work on, or check what is queued. The system prompt shows only bucket counts; this tool drills into a specific bucket and returns the task details.',

        }

    }
  }
];

// Executes a tool by name. Returns the tool's result (anything JSON-serializable).
// Throws on error — the caller wraps errors into tool_result blocks for Claude.
async function executeTool(name, input) {
  if (name === 'fetch_bucket') {
    const idx = input.bucket_index;
    const r = await fetch(`https://clover-backend.kairikeymaster.workers.dev/ticktick/bucket?index=${idx}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    return await r.json();
  }
  throw new Error(`Unknown tool: ${name}`);
}

  
// ── Main Claude call — handles tool-use loop ────────────────────────────────
async function callClaude(userMsg) {
  if (userMsg !== '__INIT__') history.push({ role: 'user', content: userMsg });
  const system = await buildSystem();

  const MAX_ITERATIONS = 10;
  for (let i = 0; i < MAX_ITERATIONS; i++) {
    const msgs = history.length ? history : [{ role: 'user', content: 'Begin.' }];
    // Retry transient overloads (529) and rate limits (429) with exponential backoff.
    let d;
    const MAX_RETRIES = 4;
    for (let attempt = 0; ; attempt++) {
      let r;
      try {
        r = await fetch('https://clover-backend.kairikeymaster.workers.dev/anthropic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-5',
            max_tokens: 1500,
            system,
            messages: msgs,
            tools: TOOLS
          })
        });
      } catch (e) {
        throw new Error(`callClaude fetch failed: ${e.message}`);
      }
      d = await r.json();
      console.log(`callClaude iteration ${i}, attempt ${attempt}:`, d);

      const errType = d.error?.type || (d.type === 'error' ? d.error?.type : null);
      const isTransient = errType === 'overloaded_error' || errType === 'rate_limit_error';

      if ((d.type === 'error' || d.error) && isTransient && attempt < MAX_RETRIES) {
        const waitMs = 1000 * Math.pow(2, attempt); // 1s, 2s, 4s, 8s
        addSys(`Anthropic ${errType} — retrying in ${waitMs / 1000}s (attempt ${attempt + 1}/${MAX_RETRIES})…`);
        await new Promise(res => setTimeout(res, waitMs));
        continue;
      }

      if (d.type === 'error' || d.error) {
        throw new Error(`Claude API error: ${JSON.stringify(d)}`);
      }
      break; // success
    }

    // Append assistant's full response to history. With tools, the content is
    // an array of blocks (text and/or tool_use), not a plain string.
    history.push({ role: 'assistant', content: d.content });

    // If Claude is done, extract text and return.
    if (d.stop_reason !== 'tool_use') {
      const text = d.content.filter(c => c.type === 'text').map(c => c.text).join('');
      if (!text) {
        throw new Error(`Claude returned no text. Full response: ${JSON.stringify(d)}`);
      }
      return text;
    }

    // Claude wants to use tools. Execute each and build tool_result blocks.
    const toolUseBlocks = d.content.filter(c => c.type === 'tool_use');
    const toolResultBlocks = await Promise.all(toolUseBlocks.map(async (block) => {
      try {
        const result = await executeTool(block.name, block.input);
        return {
          type: 'tool_result',
          tool_use_id: block.id,
          content: typeof result === 'string' ? result : JSON.stringify(result)
        };
      } catch (e) {
        return {
          type: 'tool_result',
          tool_use_id: block.id,
          content: `Error executing ${block.name}: ${e.message}`,
          is_error: true
        };
      }
    }));

    // Tool results go back to Claude as a user message containing the result blocks.
    history.push({ role: 'user', content: toolResultBlocks });
    // Loop continues with updated history.
  }

  throw new Error(`Exceeded ${MAX_ITERATIONS} tool-use iterations without a final reply`);
}
  
  

async function autoLog(userMsg, reply) {
  // Get the assistant message that came BEFORE the user's feedback message
  // At this point, history = [..., prev_assistant, feedback_user_msg, current_assistant_reply]
  const prevAssistant = history.length >= 3 
    ? history[history.length - 3].content 
    : '(no previous message)';
  
  // Strip internal newlines so the bullet stays on one line
  const cleanPrev = prevAssistant.replace(/\s+/g, ' ').trim();
  const cleanMsg = userMsg.replace(/\s+/g, ' ').trim();
  
  const entry = `**Re:** "${cleanPrev}" — **Feedback:** ${cleanMsg}`;
  const ok = await appendFeedback(entry);
  return ok;
}

// ── Validator: rewrite bad callouts before writing the annotated note back ───
// Runs after annotateNote(), before the note is written back to Obsidian.
// Three corrections, each leaving a breadcrumb so Anna can spot Clover's bad guesses:
//   1. `+ Title` where the target note doesn't exist → `* Title` in same folder
//   2. No marker, valid folder → `* <generated>` in that folder
//   3. No marker, invalid folder → `* <generated>` in CAPTURE
async function validateCallouts(annotated) {
  // Split into sections the same way the executor will: empty-heading delimited.
  const sections = annotated.split(/^# $/m);
  const validatedSections = [];

  for (let i = 0; i < sections.length; i++) {
    const section = sections[i];
    const lines = section.split('\n');
    const calloutIdx = lines.findIndex(l => l.startsWith('> [!info]'));
    if (calloutIdx === -1) { validatedSections.push(section); continue; }
    const calloutLine = lines[calloutIdx];

    // Only validating Obsidian callouts; TickTick callouts pass through untouched.
    if (!calloutLine.includes('Obsidian')) { validatedSections.push(section); continue; }

    // The item text is whatever isn't a callout line; used for title-gen fallback.
    const itemText = lines.filter(l => !l.startsWith('>')).join('\n').trim();

    // Try parsing with marker first (existing format).
    const withMarker = calloutLine.match(/Obsidian > (.+?) > ([*+])(.*)$/);
    if (withMarker) {
      const folderPath = withMarker[1].replace(/ > /g, '/');
      const action = withMarker[2];
      const titleHint = withMarker[3].trim();

      if (action === '+') {
        // Case 1: verify the target note actually exists at the implied path.
        // We try the most likely shape: <folderPath>/<titleHint>.md
        const expectedPath = `${folderPath}/${titleHint}.md`;
        const check = await obsidian(expectedPath);
        if (!check.ok) {
          // Rewrite to `*` in same folder, preserve the intended title.
          lines[calloutIdx] = `> [!info] Obsidian > ${withMarker[1]} > \\*${titleHint} <!-- auto-corrected: original \`+ ${titleHint}\` had no matching note at ${expectedPath} -->`;
        }
        // If it exists, leave the + callout alone — executor will append.
      }
      // `*` with marker — no validation needed, executor handles folder.
      validatedSections.push(lines.join('\n'));
      continue;
    }

    // No marker. Try parsing as folder-only.
    const folderOnly = calloutLine.match(/Obsidian > (.+?)\s*$/);
    if (!folderOnly) { validatedSections.push(section); continue; }
    const folderPath = folderOnly[1].replace(/ > /g, '/');

    // Generate a title from the item content (same approach as executor).
    const titleRes = await fetch('https://clover-backend.kairikeymaster.workers.dev/anthropic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 30,
        system: 'Summarize the note into a concise 3-5 word title suitable for a filename. Return ONLY the title text — no quotes, punctuation, explanation, or file extension.',
        messages: [{ role: 'user', content: itemText }]
      })
    });
    const titleData = await titleRes.json();
    const genTitle = titleData.content?.[0]?.text?.trim().replace(/[\\/:*?"<>|]/g, '') || 'Untitled Note';

    // Check if the named folder actually exists.
    const folderCheck = await obsidian(`${folderPath}/`);
    if (folderCheck.ok) {
      // Case 2: valid folder, no marker → * <gen> in that folder
      lines[calloutIdx] = `> [!info] Obsidian > ${folderOnly[1]} > \\*${genTitle} <!-- auto-corrected: no marker, generated title -->`;
    } else {
      // Case 3: invalid folder → * <gen> in CAPTURE
      lines[calloutIdx] = `> [!info] Obsidian > CAPTURE > \\*${genTitle} <!-- auto-corrected: original folder "${folderPath}" not found -->`;
    }
    validatedSections.push(lines.join('\n'));
  }

  // Reassemble with the original "# " separators.
  return validatedSections.join('# ');
}
