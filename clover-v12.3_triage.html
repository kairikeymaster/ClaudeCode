      triageStatus.textContent = 'Annotated — review in Obsidian, then click "Done reviewing."';
      executeBtn.disabled = false;
    } else {
      triageStatus.textContent = 'Failed to write back to Obsidian.';
      annotateBtn.disabled = false;
    }
  } catch(e) {
    triageStatus.textContent = 'Error: ' + e.message;
    annotateBtn.disabled = false;
    addMsg('assistant', `error at annotateBtn.addEventListener: ${e}`);
  }
});

executeBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  executeBtn.disabled = true;
  triageStatus.textContent = 'Reading reviewed note...';
  try {
    // 1. Read the (now reviewed, validated) annotated note from local Obsidian.
    const r = await obsidian(`CAPTURE/${selectedFile}`);
    const noteContent = await r.text();
    const noteTitle = selectedFile.replace('.md','');

    // 1a. LOG corrections: diff Clover's post-validator proposal against Anna's reviewed version.
    //     One JSONL record per item per run. Records go to two separate gists by outcome.
    //     Wrapped in try/catch so logging failures never block triage execution.
    try {
      const proposedRaw = lastProposedNote[selectedFile];
      if (proposedRaw) {
        const splitItems = (text) => text.split(/^# $/m).map(s => s.trim()).filter(Boolean);
        const proposedItems = splitItems(proposedRaw);
        const finalItems = splitItems(noteContent);
        // Items are matched by position (sections in the same order in both versions).
        const len = Math.min(proposedItems.length, finalItems.length);
        const timestamp = new Date().toISOString();

        for (let i = 0; i < len; i++) {
          const pLines = proposedItems[i].split('\n');
          const fLines = finalItems[i].split('\n');
          const pCallout = pLines.find(l => l.startsWith('> [!info]')) || null;
          const fCallout = fLines.find(l => l.startsWith('> [!info]')) || null;
          // Item text = everything that isn't a callout/blockquote line, from the final version.
          const itemText = fLines.filter(l => !l.startsWith('>')).join('\n').trim();

          const proposed = parseCallout(pCallout);
          const final    = parseCallout(fCallout);

          // Classify the outcome.
          let outcome;
          if (proposed.type === 'none' && final.type === 'none')       continue;                       // neither side flagged — no signal
          else if (proposed.type === 'none')                            outcome = 'added-by-anna';     // Anna added a flag Clover missed
          else if (final.type === 'none')                               outcome = 'rejected';          // Anna deleted Clover's flag entirely
          else if (calloutsMatch(proposed, final))                      outcome = 'kept';              // Anna accepted Clover's proposal
          else                                                          outcome = 'corrected';         // Anna changed something

          const record = { timestamp, daily_note: noteTitle, item_text: itemText, proposed, final, outcome };

          // Rejections go to a separate gist; everything else to the corrections gist.
          if (outcome === 'rejected') await appendRejection(record);
          else                        await appendCorrection(record);
        }
      }
    } catch(logErr) {
      console.error('Logging failed (continuing with triage):', logErr);
      addMsg('assistant', `Correction logging failed: ${logErr.message}`);
    }

    triageStatus.textContent = 'Looking up living documents...';

    // 2. Search for living-document-tagged notes for fuzzy-match on `+`. Direct fetch since /search/ is not under /vault/.
    const livingRes = await fetch(`${OBSIDIAN.base}/search/`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${OBSIDIAN.key}`, 'Content-Type': 'application/vnd.olrapi.jsonlogic+json' },
      body: JSON.stringify({ "in": ["living-document", { "var": "tags" }] })
    });
    const livingDocs = livingRes.ok ? await livingRes.json() : [];
    const livingTitles = (Array.isArray(livingDocs) ? livingDocs : []).map(d => ({
      path: d.filename,
      title: d.filename.split('/').pop().replace('.md','')
    }));

    triageStatus.textContent = 'Executing flagged items...';

    // 3. Parse sections WITH their index, so we can later map results back to the source item for annotation.
    // Note: split() on "^# $" gives N+1 pieces; first piece is pre-first-delimiter content (usually empty).
    const rawSections = noteContent.split(/^# $/m);
    const results = [];
    // Tracks paths we've PUT to in this run, so a second item routed to the same new-note
    // path appends (POST) instead of overwriting (PUT). Without this, item A is silently
    // replaced when item B targets the same * Title in the same folder.
    const createdPaths = new Set();

    for (let sectionIdx = 0; sectionIdx < rawSections.length; sectionIdx++) {
      const section = rawSections[sectionIdx].trim();
      if (!section) continue;
      const lines = section.split('\n');
      const calloutLine = lines.find(l => l.startsWith('> [!info]'));
      if (!calloutLine) continue;  // unflagged — stays in daily note, will go to CAPTURE during archive
      const itemText = lines.filter(l => !l.startsWith('>')).join('\n').trim();
      const dateStamp = `<span class="date-stamp">${noteTitle}</span>`;

      if (calloutLine.includes('TickTick')) {
                // New schema: project (~TK/BK/FM/GH/FT), priority (!pN), zero-or-more tags (#HE/#LCL/#HCL/#d0/#d1).
        const projectMatch  = calloutLine.match(/\\?~(TK|BK|FM|GH|FT)\b/);
        const priorityMatch = calloutLine.match(/\\?!(p0|p1|p3|p5)\b/);
        const tagMatches    = [...calloutLine.matchAll(/\\?#(HE|LCL|HCL|d0|d1)\b/g)];
        const project  = projectMatch  ? projectMatch[1]  : 'TK';
        const priority = priorityMatch ? priorityMatch[1] : 'p0';
        const tags     = tagMatches.map(m => m[1]);

        const titleLine = itemText.split('\n')[0];
        const restLines = itemText.split('\n').slice(1).join('\n');
        const taskRes = await fetch('https://clover-backend.kairikeymaster.workers.dev/ticktick/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: titleLine, content: restLines, project, priority, tags })
        });
        results.push({ type: 'ticktick', title: titleLine, ok: taskRes.ok, sectionIdx });

      } else if (calloutLine.includes('Obsidian')) {
        const pathMatch = calloutLine.match(/Obsidian > (.+?) > \\?([*+])(.*?)(?:\s*<!--.*?-->)?$/);
        if (!pathMatch) { results.push({ type: 'parse-error', sectionIdx, ok: false }); continue; }
        const folderPath = pathMatch[1].replace(/ > /g, '/');
        const action = pathMatch[2];
        const titleHint = pathMatch[3].trim();

        if (action === '*') {
          let title = titleHint;
          if (!title) {
            const titleRes = await fetch('https://clover-backend.kairikeymaster.workers.dev/anthropic', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: 'claude-sonnet-4-5', max_tokens: 30,
                system: 'Summarize the note into a concise 3-5 word title suitable for a filename. Return ONLY the title text — no quotes, punctuation, explanation, or file extension.',
                messages: [{ role: 'user', content: itemText }]
              })
            });
            const titleData = await titleRes.json();
            title = titleData.content?.[0]?.text?.trim().replace(/[\\/:*?"<>|]/g, '') || 'Untitled Note';
          }
          const notePath = `${folderPath}/${title}.md`;
          let noteRes;
          if (createdPaths.has(notePath)) {
            // Already created this exact path earlier in this run — append instead of overwriting.
            noteRes = await obsidian(notePath, { method: 'POST', body: `\n${itemText} ${dateStamp}` });
            results.push({ type: 'obsidian-append', title, path: notePath, ok: noteRes.ok, sectionIdx, wasMerged: true });
          } else {
            noteRes = await obsidian(notePath, { method: 'PUT', body: `${itemText} ${dateStamp}` });
            createdPaths.add(notePath);
            results.push({ type: 'obsidian-new', title, path: notePath, ok: noteRes.ok, sectionIdx });
          }

        } else if (action === '+') {
          const searchTitle = titleHint.toLowerCase();
          let match = livingTitles.find(d => d.title.toLowerCase() === searchTitle);
          if (!match) match = livingTitles.find(d =>
            d.title.toLowerCase().includes(searchTitle) || searchTitle.includes(d.title.toLowerCase())
          );


          // If no living-document match, search the whole vault by filename before giving up.
          if (!match) {
            try {
              const vaultSearchRes = await fetch(`${OBSIDIAN.base}/search/simple/?query=${encodeURIComponent(titleHint)}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${OBSIDIAN.key}` }
              });
              if (vaultSearchRes.ok) {
                const vaultResults = await vaultSearchRes.json();
                const vaultMatch = (Array.isArray(vaultResults) ? vaultResults : []).find(d => {
                  const title = d.filename.split('/').pop().replace('.md','').toLowerCase();
                  return title === searchTitle || title.includes(searchTitle) || searchTitle.includes(title);
                });
                if (vaultMatch) match = { path: vaultMatch.filename, title: vaultMatch.filename.split('/').pop().replace('.md','') };
              }
            } catch(searchErr) {
              addMsg('assistant', `Vault search failed for "${titleHint}": ${searchErr.message}`);
            }
          }

          if (match) {
            const appendRes = await obsidian(match.path, { method: 'POST', body: `\n${itemText} ${dateStamp}\n#living-document` });
            results.push({ type: 'obsidian-append', title: match.title, path: match.path, ok: appendRes.ok, sectionIdx });
          } else {
            // Genuinely not found — create new note in the named folder, tag it for future matches.
            const fallbackTitle = titleHint || 'Unmatched Note';
            const fallbackPath = `${folderPath}/${fallbackTitle}.md`;
            let fallbackRes;
            if (createdPaths.has(fallbackPath)) {
              fallbackRes = await obsidian(fallbackPath, { method: 'POST', body: `\n${itemText} ${dateStamp}\n#living-document` });
              results.push({ type: 'obsidian-append', title: fallbackTitle, path: fallbackPath, ok: fallbackRes.ok, sectionIdx, wasMerged: true, wasFallback: true });
            } else {
              fallbackRes = await obsidian(fallbackPath, { method: 'PUT', body: `${itemText} ${dateStamp}\n#living-document` });
              createdPaths.add(fallbackPath);
              results.push({ type: 'obsidian-new', title: fallbackTitle, path: fallbackPath, ok: fallbackRes.ok, sectionIdx, wasFallback: true });
            }
          }
        }
      } else if (calloutLine.includes('archive')) {
        results.push({ type: 'archive', ok: true, sectionIdx });
      }
    }

    // 4. VERIFIER: confirm each Obsidian result actually landed on disk.
    // TickTick we trust the create call's ok flag (TickTick has eventual-consistency lag on reads).
    triageStatus.textContent = 'Verifying writes...';
    for (const res of results) {
      if (res.type === 'obsidian-new' || res.type === 'obsidian-append') {
        const verifyRes = await obsidian(res.path);
        if (!verifyRes.ok) res.ok = false;  // overwrite — verification failed
      }
    }

    const anyFailed = results.some(r => !r.ok);

    // 5. ANNOTATE the daily note in place: backlinks for successes, warnings for failures.
    // Walk the sections again, rewrite each one based on its result.
    const updatedSections = [...rawSections];
    for (const res of results) {
      const sec = updatedSections[res.sectionIdx];
      if (!sec) continue;
      let annotation = '';
      if (!res.ok) {
        annotation = `\n\n> [!failure] Item failed to generate!`;
      } else if (res.type === 'obsidian-new') {
        annotation = `\n→ [[${res.title}]]`;
      } else if (res.type === 'obsidian-append') {
        annotation = `\n→ [[${res.title}]]`;
      } else if (res.type === 'ticktick') {
        annotation = `\n→ TickTick: ${res.title}`;
      }
      // Append annotation at end of section (preserve existing content including the callout).
      updatedSections[res.sectionIdx] = sec.replace(/\s*$/, '') + annotation + '\n';
    }
    const updatedNote = updatedSections.join('# ');

    if (anyFailed) {
      // Write the annotated-with-warnings note back to CAPTURE; do NOT archive.
      await obsidian(`CAPTURE/${noteTitle}.md`, { method: 'PUT', body: updatedNote });
      triageStatus.innerHTML = `<strong>Partial failure — daily note NOT archived.</strong><br><pre style="font-size:10px;margin-top:6px;white-space:pre-wrap">Review CAPTURE/${noteTitle}.md in Obsidian; failed items are tagged with > [!warning].</pre>`;
    } else {
      // All good: write the backlinked version to _archive, delete the CAPTURE original.
      const archivePath = `_archive/${noteTitle}.md`;
      await obsidian(archivePath, { method: 'PUT', body: updatedNote });
      await obsidian(`CAPTURE/${noteTitle}.md`, { method: 'DELETE' });
      const summary = results.map(r => {
        if (r.type === 'ticktick') return `✓ TickTick: ${r.title}`;
        if (r.type === 'obsidian-new') return r.wasFallback ? `✓ New note (+ fallback): ${r.title}` : `✓ New note: ${r.title}`;
        if (r.type === 'obsidian-append') return `✓ Appended to: ${r.title}`;
        if (r.type === 'archive') return `✓ Archived`;
        return `? ${r.type}`;
      }).join('\n');
      triageStatus.innerHTML = `<strong>Done!</strong><br><pre style="font-size:10px;margin-top:6px;white-space:pre-wrap">${summary}</pre>`;
    }

  } catch(e) {
    triageStatus.textContent = 'Error: ' + e.message;
    executeBtn.disabled = false;
    addMsg('assistant', `executeBtn.addEventListener error: ${e}\n${e.stack || ''}`);
  }
});

async function annotateNote(content) {
  // Pre-flight size guard: abort before hitting the API if the note is suspiciously large.
  // Normal daily notes are well under 5k characters; 30k is a safe ceiling that leaves
  // headroom before the ~30k token/min rate limit would be approached.
  const MAX_NOTE_CHARS = 30000;
  if (content.length > MAX_NOTE_CHARS) {
    const estTokens = Math.round(content.length / 4);
    const msg = `Note too large to annotate: ${content.length.toLocaleString()} characters (~${estTokens.toLocaleString()} tokens), exceeding the ${MAX_NOTE_CHARS.toLocaleString()}-character safety limit. This usually means pasted code, accumulated content, or leftover callouts from a previous partial run. Open the file in Obsidian, remove the bloat, and retry.`;
    addMsg('assistant', msg);
    triageStatus.textContent = 'Aborted: note too large';
    throw new Error(msg);
  }

  const [pkm, triageInstructions] = await Promise.all([
    fetch(`https://clover-backend.kairikeymaster.workers.dev/gist?id=${GISTS.context}`).then(r => r.text()),
    fetch(`https://clover-backend.kairikeymaster.workers.dev/gist?id=${GISTS.triage}`).then(r => r.text())
  ]);
  
  const r = await fetch('https://clover-backend.kairikeymaster.workers.dev/anthropic', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 4000,
      system: `You are a triage assistant. Annotate daily notes by adding > [!info] callouts proposing destinations for each item.\n\n${pkm}\n\n${triageInstructions}\n\nReturn ONLY the complete note with callouts inserted. No explanation, no commentary, no questions — only the raw note content with callouts added. Preserve all backslashes exactly as shown in examples (write \\#task not #task, \\*New Note not *New Note).`,
      messages: [
        { role: 'user', content: `Annotate this daily note:\n\n${content}` }
      ]
    })
  });
  
  const d = await r.json();
  console.log('API response:', d);
  
   if (d.type === 'error') {
    console.log('Error details:', d.error);
    triageStatus.textContent = 'API error: ' + (d.error?.message || JSON.stringify(d.error));
    return content;
  }

const rawResult = d.content?.[0]?.text || content;
  // Belt-and-suspenders: the model sometimes wraps its whole response in ```markdown ... ```
  // or just ``` ... ```, ignoring the system prompt's instruction not to. Strip a single
  // outer fence if present. Only strips a fence that wraps the ENTIRE response; inner code
  // blocks (e.g., examples a user might write inside an item) are left alone.
  const fenceMatch = rawResult.match(/^\s*```[a-zA-Z]*\n([\s\S]*?)\n```\s*$/);
  const result = fenceMatch ? fenceMatch[1] : rawResult;
    console.log('Returning:', result.slice(0, 200));
  return result;
}



// ── Voice mode ──────────────────────────────────────────────────────────────

const voiceToggle  = document.getElementById('voice-toggle');
const voiceBar     = document.getElementById('voice-bar');
const micBtn       = document.getElementById('mic-btn');
const voiceStatus  = document.getElementById('voice-status');
const vmodeBtns    = document.querySelectorAll('.vmode-btn');
const inputArea    = document.getElementById('input-area');

let voiceActive    = false;
let greetingSent   = false;
let walkieBuffer   = '';
let voiceMode      = 'walkie';   // 'walkie' | 'convo'
let isListening    = false;
let isSpeaking     = false;
let recognition    = null;
let convoSilTimer  = null;
let currentAudio   = null;
const SILENCE_MS   = 2500;       // convo mode: pause before sending

// Auto-switch to voice if narrow screen (phone)
function shouldAutoVoice() {
  return window.innerWidth <= 900 || ('ontouchstart' in window && window.innerWidth <= 1500);
}

function setVoiceActive(on) {
  voiceActive = on;
  voiceToggle.classList.toggle('active', on);
  voiceBar.classList.toggle('visible', on);
  inputArea.classList.toggle('hidden', on);
  updateNextBtn();
  if (!on) { stopListening(); return; }
  // Turning voice ON with no conversation yet → fire the greeting (spoken via send()).
  if (!greetingSent && history.length === 0) {
    greetingSent = true;
    send('__INIT__');
  }
}

// Mode buttons
vmodeBtns.forEach(b => {
  b.addEventListener('click', () => {
    vmodeBtns.forEach(x => x.classList.remove('selected'));
    b.classList.add('selected');
    voiceMode = b.id === 'vmode-walkie' ? 'walkie' : 'convo';
    updateMicHint();
    if (isListening) stopListening();
  });
});

voiceToggle.addEventListener('click', () => setVoiceActive(!voiceActive));

function updateMicHint() {
  if (isSpeaking)    { voiceStatus.textContent = 'speaking…'; return; }
  if (isListening)   { voiceStatus.textContent = 'listening…'; return; }
  voiceStatus.textContent = voiceMode === 'walkie' ? 'hold to talk' : 'tap to start';
}

// ── STT via Web Speech API ───────────────────────────────────────────────────
function buildRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { voiceStatus.textContent = 'STT not supported'; return null; }
  const r = new SpeechRecognition();
  r.continuous     = true;    // keep listening across pauses, both modes
  r.interimResults = false;
  r.lang           = 'en-US';

  r.onresult = (e) => {
    // Append only the newest finalized results to the buffer.
    let newText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) newText += e.results[i][0].transcript + ' ';
    }
    newText = newText.trim();
    if (!newText) return;
    walkieBuffer = (walkieBuffer + ' ' + newText).trim();

    if (voiceMode === 'convo') {
      // convo mode: send after SILENCE_MS of quiet
      clearTimeout(convoSilTimer);
      convoSilTimer = setTimeout(() => {
        const t = walkieBuffer; walkieBuffer = '';
        stopListening();
        handleVoiceInput(t);
      }, SILENCE_MS);
    }
    // walkie mode: do nothing here — we send on button release
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech') { updateMicHint(); return; }
    voiceStatus.textContent = 'mic error: ' + e.error;
    stopListening();
  };

  r.onend = () => {
    // If the user is still holding, restart — the API auto-ends after long pauses
    // even in continuous mode, and we don't want to drop the rest of their sentence.
    if (isListening) {
      try { r.start(); } catch(_) {}
    } else {
      micBtn.classList.remove('listening');
      updateMicHint();
    }
  };

  return r;
}

function stopEverything() {
  // Stop TTS playback
  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    currentAudio = null;
  }
  // Stop listening
  clearTimeout(convoSilTimer);
  isListening = false;
  micBtn.classList.remove('listening');
  if (recognition) { try { recognition.stop(); } catch(_) {} recognition = null; }
  isSpeaking = false;
  micBtn.disabled = false;
  micBtn.classList.remove('speaking');
  updateMicHint();
}

function startListening() {
  stopEverything();
  walkieBuffer = '';
  recognition = buildRecognition();
  if (!recognition) return;
  try {
    recognition.start();
    isListening = true;
    micBtn.classList.add('listening');
    updateMicHint();
  } catch(e) {
    addMsg('assistant', `could not start mic: ${e}`);
  }
}

function stopListening() {
  clearTimeout(convoSilTimer);
  isListening = false;
  micBtn.classList.remove('listening');
  if (recognition) { try { recognition.stop(); } catch(_) {} recognition = null; }
  updateMicHint();
}

// ── Walkie-talkie: hold pointer or spacebar ─────────────────────────────────

function finishWalkie() {
  const t = walkieBuffer.trim();
  walkieBuffer = '';
  stopListening();
  if (t) handleVoiceInput(t);
}
function cancelWalkie() {
  walkieBuffer = '';
  stopListening();
  updateMicHint();
}

micBtn.addEventListener('pointerup', () => {
  if (voiceMode !== 'walkie') return;
  if (isListening) finishWalkie();
});

micBtn.addEventListener('pointercancel', () => {
  if (voiceMode !== 'walkie') return;
  if (isListening) cancelWalkie();
});

micBtn.addEventListener('pointerleave', (e) => {
  if (voiceMode !== 'walkie') return;
  if (e.buttons > 0 && isListening) cancelWalkie();
});

// Drag finger/mouse off the button while held → stop (avoids stuck-listening)
micBtn.addEventListener('pointerleave', (e) => {
  if (voiceMode !== 'walkie') return;
  if (e.buttons > 0 && isListening) stopListening();
});

// Spacebar push-to-talk (desktop)
let spacePTTActive = false;
document.addEventListener('keydown', (e) => {
  if (e.code !== 'Space') return;
  if (!voiceActive || voiceMode !== 'walkie') return;
  const tag = (e.target?.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || e.target?.isContentEditable) return;
  if (e.repeat) return;
  e.preventDefault();
  // Blur any focused button so spacebar doesn't also activate it
  if (document.activeElement && document.activeElement.blur) {
    document.activeElement.blur();
  }
  if (!isListening) {
    spacePTTActive = true;
    startListening();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code !== 'Space') return;
  if (!spacePTTActive) return;
  spacePTTActive = false;
  if (isListening) finishWalkie();
});

// ── Conversation mode: tap to start/stop ────────────────────────────────────
micBtn.addEventListener('click', () => {
  if (voiceMode !== 'convo') return;
  if (isListening) stopListening();
  else startListening();
});

// ── Send transcript → Claude → TTS ──────────────────────────────────────────
async function handleVoiceInput(transcript) {
  addMsg('user', transcript);
  micBtn.disabled = true;
  micBtn.classList.add('speaking');
  isSpeaking = true;
  updateMicHint();

  const typ = addTyping();
  try {
    const reply = await callClaude(transcript);
    typ.remove();
    const nm = detectMode(reply);
    if (nm) setMode(nm);
    const task = extractTask(reply);
    addMsg('assistant', reply, task);

    // Log transcript
    const ts = new Date().toLocaleString('sv-SE').slice(0, 16);
    fetch('https://clover-backend.kairikeymaster.workers.dev/append-transcript', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: 'V', user: transcript, assistant: reply, timestamp: ts })
    });

    await speakReply(reply);
  } catch(e) {
    typ.remove();
    addMsg('assistant', `error at handleVoiceInput function: ${e}`);
  }

  isSpeaking = false;
  micBtn.disabled = false;
  micBtn.classList.remove('speaking');

  // In convo mode, auto-restart mic after speaking
  if (voiceActive && voiceMode === 'convo') startListening();
  else updateMicHint();
}

// ── OpenAI TTS ───────────────────────────────────────────────────────────────
let currentAbortController = null;

async function speakReply(text) {
  voiceStatus.textContent = 'speaking…';
  const clean = text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/#+\s/g, '')
    .trim();

  if (currentAbortController) currentAbortController.abort();
  currentAbortController = new AbortController();
  const signal = currentAbortController.signal;

  try {
    const r = await fetch('https://clover-backend.kairikeymaster.workers.dev/openai-tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: clean, voice: 'echo' }),
      signal
    });
    if (!r.ok) {
      const errText = await r.text();
      throw new Error(`TTS HTTP ${r.status}: ${errText}`);
    }
    await streamPlayAudio(r, signal);
  } catch(e) {
    if (e.name === 'AbortError') { console.log('TTS aborted'); return; }
    voiceStatus.textContent = 'TTS error — see chat';
    console.error('TTS error:', e);
    addMsg('assistant', `❌ TTS error: ${e.message}\n${e.stack || ''}`);
  }
  updateMicHint();
}

function streamPlayAudio(response, signal) {
  return new Promise((resolve, reject) => {
    if (currentAudio) { try { currentAudio.pause(); } catch {} currentAudio = null; }

    const mimeType = 'audio/mpeg';
    if (!('MediaSource' in window) || !MediaSource.isTypeSupported(mimeType)) {
      reject(new Error(`Browser doesn't support MSE for ${mimeType}`));
      return;
    }

    const mediaSource = new MediaSource();
    const audio = new Audio();
    const objectUrl = URL.createObjectURL(mediaSource);
    audio.src = objectUrl;
    currentAudio = audio;

    let cleaned = false;
    const cleanup = () => { if (!cleaned) { cleaned = true; URL.revokeObjectURL(objectUrl); } };

    audio.addEventListener('ended', () => { cleanup(); resolve(); });
    audio.addEventListener('error', () => {
      const err = audio.error;
      cleanup();
      reject(new Error(`Audio error code=${err?.code} msg=${err?.message || 'unknown'}`));
    });
    signal.addEventListener('abort', () => {
      try { audio.pause(); } catch {}
      cleanup();
      resolve();
    });

    mediaSource.addEventListener('sourceopen', async () => {
      let sourceBuffer;
      try {
        sourceBuffer = mediaSource.addSourceBuffer(mimeType);
      } catch (err) {
        reject(new Error(`addSourceBuffer failed: ${err.message}`));
        return;
      }

      const queue = [];
      let streamDone = false;
      let playStarted = false;

      const processQueue = () => {
        if (sourceBuffer.updating) return;
        if (queue.length === 0) {
          if (streamDone && mediaSource.readyState === 'open') {
            try { mediaSource.endOfStream(); } catch {}
          }
          return;
        }
        try { sourceBuffer.appendBuffer(queue.shift()); }
        catch (err) { reject(new Error(`appendBuffer failed: ${err.message}`)); }
      };
      sourceBuffer.addEventListener('updateend', processQueue);

      try {
        const reader = response.body.getReader();
        while (true) {
          if (signal.aborted) { try { reader.cancel(); } catch {} return; }
          const { value, done } = await reader.read();
          if (done) { streamDone = true; processQueue(); break; }
          queue.push(value);
          processQueue();
          if (!playStarted) {
            playStarted = true;
            audio.play().catch(err => {
              if (err.name !== 'AbortError') reject(new Error(`audio.play(): ${err.message}`));
            });
          }
        }
      } catch (err) {
        if (err.name !== 'AbortError') reject(err);
      }
    });
  });
}

// Auto-switch on load
window.addEventListener('load', () => {
  if (shouldAutoVoice()) setVoiceActive(true);
});

// Also handle Tasker/widget URL params
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('voice') === '1') setVoiceActive(true);
if (urlParams.get('mode') === 'convo') {
  voiceMode = 'convo';
  vmodeBtns.forEach(b => b.classList.toggle('selected', b.id === 'vmode-convo'));
}

// ── End voice mode ───────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────────
// WINNOW
// Pre-annotate culling step. Walks through each item in the selected CAPTURE
// note, asks for a 1–10 payoff estimate and an XXS–XXL effort estimate,
// computes net = payoff − effortCode (effortCode: XXS=1 … XXL=7), and routes:
//   net >= 1                      → KEEP (item left untouched)
//   net <= -2 AND payoff < 5      → ABANDON (item stays in note with date-stamp tag)
//   else                           → user picks SALVAGE or ABANDON
// Salvaged items are removed from source and appended to SOMEDAY/Dream Chores/Salvage.md.
// Abandoned items remain in the source note so they're preserved in the eventual archive.
// ─────────────────────────────────────────────────────────────────────────────
const EFFORT_LABELS = ['XXS','XS','S','M','L','XL','XXL'];
const EFFORT_DEFAULT_CODE = 4; // M
const WINNOW_TIMER_TOTAL_MS = 40000;
const WINNOW_TIMER_VISIBLE_MS = 10000;
const SALVAGE_NOTE_PATH = 'SOMEDAY/Dream Chores/Salvage.md';

const winnowBtn = document.getElementById('winnow-btn');
let winnowState = null;

winnowBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  winnowBtn.disabled = true;
  triageStatus.textContent = 'Reading note for winnow...';
  try {
    const r = await obsidian(`CAPTURE/${selectedFile}`);
    if (!r.ok) throw new Error(`Read failed: HTTP ${r.status}`);
    const noteContent = await r.text();
    // Same delimiter convention as the executor: `^# $` (a line containing exactly "# ").
    const sections = noteContent.split(/^# $/m);
    const preamble = sections[0];
    // Drop entirely empty trailing sections (e.g. trailing `# `).
    const itemSections = sections.slice(1).filter(s => s.trim().length > 0);
    if (itemSections.length === 0) {
      triageStatus.textContent = 'No items to winnow.';
      annotateBtn.disabled = false;
      winnowBtn.disabled = false;
      addMsg('assistant', `Winnow: no items found in ${selectedFile} (split on /^# $/m returned no non-empty sections).`);
      return;
    }
    winnowState = {
      preamble,
      items: itemSections,
      decisions: new Array(itemSections.length).fill(null),
      scores: new Array(itemSections.length).fill(null),
      index: 0,
    };
    // Switch to chat view to host per-item UI; user clicks Triage again later to return.
    triagePanel.classList.remove('visible');
    chat.style.display = 'flex';
    document.getElementById('input-area').style.display = 'none';
    addSys(`Winnowing ${itemSections.length} item${itemSections.length === 1 ? '' : 's'} from ${selectedFile.replace('.md','')}`);
    showWinnowBeginButton();
  } catch(e) {
    triageStatus.textContent = 'Winnow start failed — see chat.';
    winnowBtn.disabled = false;
    addMsg('assistant', `error at winnowBtn.click: ${e.message}\n${e.stack || ''}`);
  }
});

function showWinnowBeginButton() {
  // Shown before the very first item, and after any timeout-reset on the current item.
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  const btn = document.createElement('button');
  btn.className = 'winnow-action-btn primary';
  btn.textContent = winnowState.index === 0
    ? `Begin (item 1 of ${winnowState.items.length}) →`
    : `Begin again (item ${winnowState.index + 1} of ${winnowState.items.length}) →`;
  btn.addEventListener('click', () => {
    wrap.remove();
    renderWinnowItem();
  });
  wrap.appendChild(btn);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  setTimeout(() => btn.focus(), 0);
}

function renderWinnowItem() {
  if (winnowState.index >= winnowState.items.length) return finishWinnow();
  const itemRaw = winnowState.items[winnowState.index];
  const itemText = itemRaw.trim();

  const block = document.createElement('div');
  block.className = 'winnow-block';
  block.tabIndex = -1;

  const counter = document.createElement('div');
  counter.className = 'winnow-item-counter';
  counter.textContent = `Item ${winnowState.index + 1} of ${winnowState.items.length}`;
  block.appendChild(counter);


//GEEDLET-EDITED SECTION
  const payoffWrap = document.createElement('div');
  const payoffLabel = document.createElement('div');
  payoffLabel.className = 'winnow-section-label';
  payoffLabel.textContent = "PAYOFF: a year from now, how much would you regret not doing this?";
  payoffWrap.appendChild(payoffLabel);

  const slider = document.createElement('div');
  slider.className = 'winnow-slider untouched';
  slider.tabIndex = 0;
  const fill = document.createElement('div');
  fill.className = 'winnow-slider-fill';
  slider.appendChild(fill);
  payoffWrap.appendChild(slider);
  block.appendChild(payoffWrap);
//END  
  
  const textDiv = document.createElement('div');
  textDiv.className = 'winnow-item-text';
  textDiv.textContent = itemText || '(empty item)';
  block.appendChild(textDiv);

  const effortWrap = document.createElement('div');
  const effortLabel = document.createElement('div');
  effortLabel.className = 'winnow-section-label';
  effortLabel.textContent = 'EFFORT';
  effortWrap.appendChild(effortLabel);

  const effortRow = document.createElement('div');
  effortRow.className = 'winnow-effort';
  const effortBtns = EFFORT_LABELS.map((lbl, i) => {
    const b = document.createElement('button');
    b.className = 'effort-btn';
    b.textContent = lbl;
    b.tabIndex = 0;
    if (i + 1 === EFFORT_DEFAULT_CODE) b.classList.add('selected');
    effortRow.appendChild(b);
    return b;
  });
  effortWrap.appendChild(effortRow);
  block.appendChild(effortWrap);

  const timerEl = document.createElement('div');
  timerEl.className = 'winnow-timer';
  block.appendChild(timerEl);

  const actionsRow = document.createElement('div');
  actionsRow.className = 'winnow-actions';
  block.appendChild(actionsRow);

  chat.appendChild(block);
  chat.scrollTop = chat.scrollHeight;

  // Per-item state.
  const state = {
    payoff: 0,
    payoffTouched: false,
    effortCode: EFFORT_DEFAULT_CODE,
    effortTouched: false,
    phase: 'payoff',         // 'payoff' | 'effort' | 'resolved'
    submitted: false,
    timerStarted: false,
    timerStart: 0,
    timerId: null,
  };

  // tick + submit are declared later; arrow functions resolve names at call time, so this is fine.
  const startTimerIfNeeded = () => {
    if (state.timerStarted || state.submitted) return;
    state.timerStarted = true;
    state.timerStart = Date.now();
    state.timerId = setInterval(tick, 100);
  };

  const maybeAutoSubmit = () => {
    if (state.payoffTouched && state.effortTouched && !state.submitted) {
      submit();
    }
  };

  const setPayoff = (v, fromInteraction) => {
    if (state.submitted) return;
    if (fromInteraction) {
      state.payoffTouched = true;
      slider.classList.remove('untouched');
      startTimerIfNeeded();
    }
    const min = state.payoffTouched ? 1 : 0;
    v = Math.max(min, Math.min(10, v));
    state.payoff = v;
    fill.style.width = `${v * 10}%`;
    if (fromInteraction) maybeAutoSubmit();
  };

  // Clicking the slider is focus-only — same effect as tabbing into it. Use keyboard to set value.
  slider.addEventListener('pointerdown', (e) => {
    if (state.submitted) return;
    startTimerIfNeeded();
    slider.focus();
  });

  const setEffort = (code, fromInteraction) => {
    if (state.submitted) return;
    state.effortCode = code;
    effortBtns.forEach((b, i) => b.classList.toggle('selected', i + 1 === code));
    if (fromInteraction) {
      state.effortTouched = true;
      startTimerIfNeeded();
      maybeAutoSubmit();
    }
  };
  effortBtns.forEach((b, i) => {
    b.addEventListener('click', () => {
      setEffort(i + 1, true);
      state.phase = 'effort';
    });
  });

  // Keyboard navigation: scoped to the block so it doesn't fight the textarea.
  const keyHandler = (e) => {
    if (state.submitted) return;
    const k = e.key;
    if (state.phase === 'payoff') {
      if (k === 'ArrowRight' || k === 'ArrowUp') {
        e.preventDefault();
        const base = state.payoffTouched ? state.payoff : 0;
        setPayoff(base + 1, true);
      } else if (k === 'ArrowLeft' || k === 'ArrowDown') {
        e.preventDefault();
        const base = state.payoffTouched ? state.payoff : 1;
        setPayoff(base - 1, true);
      } else if (/^[0-9]$/.test(k)) {
        e.preventDefault();
        const n = parseInt(k, 10);
        setPayoff(n === 0 ? 10 : n, true);
      } else if (k === 'Enter') {
        e.preventDefault();
        state.phase = 'effort';
        effortBtns[state.effortCode - 1].focus();
      }
    } else if (state.phase === 'effort') {
      if (k === 'ArrowRight' || k === 'ArrowDown') {
        e.preventDefault();
        const next = Math.min(7, state.effortCode + 1);
        setEffort(next, true);
        effortBtns[next - 1].focus();
      } else if (k === 'ArrowLeft' || k === 'ArrowUp') {
        e.preventDefault();
        const next = Math.max(1, state.effortCode - 1);
        setEffort(next, true);
        effortBtns[next - 1].focus();
      } else if (/^[1-7]$/.test(k)) {
        e.preventDefault();
        const n = parseInt(k, 10);
        setEffort(n, true);
        effortBtns[n - 1].focus();
      } else if (k === 'Enter') {
        e.preventDefault();
        submit();
      }
    }
  };
  block.addEventListener('keydown', keyHandler);

  // Timer — always counting, visibility flips on at last 10s; expiry behavior depends on touched.
  const tick = () => {
    const elapsed = Date.now() - state.timerStart;
    const remaining = Math.max(0, WINNOW_TIMER_TOTAL_MS - elapsed);
    if (remaining <= WINNOW_TIMER_VISIBLE_MS && remaining > 0) {
      timerEl.classList.add('show');
      timerEl.innerHTML = `<span class="winnow-timer-pill">${Math.ceil(remaining / 1000)}s</span>`;
    }
    if (remaining <= 0) {
      clearInterval(state.timerId);
      state.timerId = null;
      onTimerExpire();
    }
  };

  const onTimerExpire = () => {
    if (state.submitted) return;
    if (!state.payoffTouched) {
      // Reset: lock controls, require manual restart from the Begin button.
      slider.style.pointerEvents = 'none';
      effortBtns.forEach(b => b.style.pointerEvents = 'none');
      slider.style.opacity = '0.4';
      effortRow.style.opacity = '0.4';
      effortLabel.classList.add('dim');
      timerEl.classList.remove('show');
      timerEl.classList.add('dim');
      timerEl.textContent = '⏱ timed out — payoff was untouched, item reset';
      block.removeEventListener('keydown', keyHandler);
      showWinnowBeginButton();
      return;
    }
    submit();
  };

  const submit = () => {
    if (state.submitted) return;
    state.submitted = true;
    if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
    timerEl.classList.remove('show');
    timerEl.textContent = '';

    const payoff = state.payoff;
    const effortCode = state.effortCode;
    const net = payoff - effortCode;

    let outcome;
    if (net >= 1) outcome = 'keep';
    else if (net <= -2 && payoff < 5) outcome = 'abandon-auto';
    else outcome = 'salvage-band';

    winnowState.scores[winnowState.index] = { payoff, effortCode, net };

    const res = document.createElement('div');
    res.className = 'winnow-resolution';
    const effortLbl = EFFORT_LABELS[effortCode - 1];
    res.innerHTML = `payoff <b>${payoff}</b> • effort <b>${effortLbl}</b> (${effortCode}) • net <b>${net}</b>`;
    block.insertBefore(res, actionsRow);

    if (outcome === 'keep') {
      const tag = document.createElement('div');
      tag.innerHTML = '<span class="outcome keep">KEEP</span> — proceeds to annotate stage';
      tag.style.marginTop = '6px';
      res.appendChild(tag);
      winnowState.decisions[winnowState.index] = 'keep';
      addAdvanceButton();
    } else if (outcome === 'abandon-auto') {
      const tag = document.createElement('div');
      tag.innerHTML = '<span class="outcome abandon">ABANDON</span> — date-stamp tag will be appended in source';
      tag.style.marginTop = '6px';
      res.appendChild(tag);
      winnowState.decisions[winnowState.index] = 'abandon';
      addAdvanceButton();
    } else {
      const tag = document.createElement('div');
      tag.innerHTML = '<span class="outcome salvage-band">SALVAGE BAND</span> — pick one (↔ to navigate, Enter to choose):';
      tag.style.marginTop = '6px';
      res.appendChild(tag);

      const salvageBtn = document.createElement('button');
      salvageBtn.className = 'winnow-action-btn';
      salvageBtn.textContent = 'Salvage → Dream Chores';
      const abandonBtn = document.createElement('button');
      abandonBtn.className = 'winnow-action-btn danger';
      abandonBtn.textContent = 'Abandon';

      const choose = (decision) => {
        winnowState.decisions[winnowState.index] = decision;
        winnowState.index += 1;
        renderWinnowItem();
      };
      salvageBtn.addEventListener('click', () => choose('salvage'));
      abandonBtn.addEventListener('click', () => choose('abandon'));

      // Left/right arrow nav between the two; Enter clicks the focused button natively.
      const salvageKeyHandler = (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          if (document.activeElement === abandonBtn) salvageBtn.focus();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          if (document.activeElement === salvageBtn) abandonBtn.focus();
        }
      };
      block.addEventListener('keydown', salvageKeyHandler);

      actionsRow.appendChild(abandonBtn);
      actionsRow.appendChild(salvageBtn);
      setTimeout(() => abandonBtn.focus(), 0);
    }
  };

  const addAdvanceButton = () => {
    const isLast = winnowState.index === winnowState.items.length - 1;
    const nextBtn = document.createElement('button');
    nextBtn.className = 'winnow-action-btn primary';
    nextBtn.textContent = isLast ? 'Finish winnow →' : 'Next item →';
    nextBtn.addEventListener('click', () => {
      winnowState.index += 1;
      renderWinnowItem();
    });
    actionsRow.appendChild(nextBtn);
    setTimeout(() => nextBtn.focus(), 0);
  };

  // Initial focus on the slider so digits and arrows work immediately.
  setTimeout(() => slider.focus(), 0);
}

async function finishWinnow() {
  addSys('Applying winnow decisions...');
  try {
    const stampDate = new Date().toISOString().slice(0, 10);
    const parts = [winnowState.preamble];
    const salvageEntries = [];
    let kept = 0, abandoned = 0, salvaged = 0;

    for (let i = 0; i < winnowState.items.length; i++) {
      const itemSection = winnowState.items[i]; // includes leading "\n"
      const decision = winnowState.decisions[i];
      const score = winnowState.scores[i];
      const effortLbl = score ? EFFORT_LABELS[score.effortCode - 1] : '?';

      if (decision === 'keep' || !decision) {
        parts.push(`# ${itemSection}`);
        kept++;
      } else if (decision === 'abandon') {
        // Preserve leading "\n" from the section so the stored format stays "\n# \n<text>\n<stamp>\n".
        const cleanSection = itemSection.replace(/\s+$/, '');
        const stamp = `<span class="date-stamp">abandoned on ${stampDate} • payoff = ${score.payoff} • effort = ${effortLbl} • net value = ${score.net}</span>`;
        parts.push(`# ${cleanSection}\n${stamp}\n`);
        abandoned++;
      } else if (decision === 'salvage') {
        const trimmed = itemSection.trim();
        const sourceTitle = selectedFile.replace('.md','');
        const stamp = `<span class="date-stamp">salvaged on ${stampDate} from [[${sourceTitle}]] • payoff = ${score.payoff} • effort = ${effortLbl}</span>`;
        salvageEntries.push(`# \n${trimmed}\n${stamp}`);
        salvaged++;
      }
    }

    const rebuilt = parts.join('');

    // Write modified source note.
    const w = await obsidian(`CAPTURE/${selectedFile}`, { method: 'PUT', body: rebuilt });
    if (!w.ok) {
      const errText = await w.text();
      throw new Error(`Source note write failed: HTTP ${w.status} — ${errText}`);
    }

    // Append salvage entries to the dedicated note (POST = append; creates file if missing).
    if (salvageEntries.length > 0) {
      const salvageBody = '\n' + salvageEntries.join('\n');
      const s = await obsidian(SALVAGE_NOTE_PATH, { method: 'POST', body: salvageBody });
      if (!s.ok) {
        const errText = await s.text();
        addMsg('assistant', `WARNING: salvage append failed (HTTP ${s.status} — ${errText}). ${salvaged} salvaged item(s) were NOT moved to ${SALVAGE_NOTE_PATH}. The source note WAS updated, so those items are gone from CAPTURE. You'll need to recover them manually from this list:\n\n${salvageEntries.join('\n\n---\n\n')}`);
      }
    }

    addSys(`Winnow complete: ${kept} kept · ${abandoned} abandoned · ${salvaged} salvaged`);

    winnowState = null;
    // Return to triage panel; Annotate is now unlocked.
    triagePanel.classList.add('visible');
    chat.style.display = 'none';
    triageStatus.textContent = `Winnow done (${kept} kept · ${abandoned} abandoned · ${salvaged} salvaged). Click Annotate when ready.`;
    annotateBtn.disabled = false;
  } catch(e) {
    addMsg('assistant', `error at finishWinnow: ${e.message}\n${e.stack || ''}`);
    triageStatus.textContent = 'Winnow finish failed — see chat for details.';
    winnowBtn.disabled = false;
  }
}
// ── End winnow ───────────────────────────────────────────────────────────────

init();
</script>
